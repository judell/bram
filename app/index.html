<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>xmlui-desktop</title>
    <link rel="stylesheet" href="vendor/xterm.css" />
    <link rel="stylesheet" href="styles.css" />
    <script src="vendor/xterm.js"></script>
    <script src="vendor/addon-fit.js"></script>
    <script src="vendor/addon-webgl.js"></script>
  </head>
  <body>
    <div class="toolbar top">
      <button id="reload-right" title="Reload the XMLUI right pane">
        &#x21bb; reload right pane
      </button>
    </div>
    <div class="split">
      <div id="terminal" class="pane pane-left"></div>
      <div id="splitter" class="splitter" role="separator" aria-orientation="vertical"></div>
      <div class="right-column">
        <iframe
          id="right-pane"
          class="pane pane-project"
        ></iframe>
        <div
          id="h-splitter"
          class="h-splitter hidden"
          role="separator"
          aria-orientation="horizontal"
        ></div>
        <iframe
          id="tools-pane"
          class="pane pane-tools hidden"
          src="about:blank"
        ></iframe>
      </div>
    </div>
    <div class="toolbar bottom">
      <button id="toggle-tools" title="Toggle tools drawer">tools</button>
    </div>
    <script>
      // Confirm index.html itself reloaded fresh (writes to cargo run stderr
      // via the existing log_from_right_pane command — same channel as the
      // iframe uses so we can compare timestamps).
      if (window.__TAURI__ && window.__TAURI__.core) {
        window.__TAURI__.core
          .invoke("log_from_right_pane", {
            payload: {
              kind: "index.html-loaded",
              at: new Date().toISOString(),
            },
          })
          .catch(function () {});
      }
      // Cache-bust main.js on every load so JS edits are picked up after a
      // restart without fighting the webview cache.
      document.write(
        '<script src="main.js?v=' + Date.now() + '"></' + 'script>'
      );
    </script>
  </body>
</html>
