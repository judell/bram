name: Build Binaries

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag for this release (e.g. v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:

  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Worklist-guard bundle in sync with canonical
        run: diff -q .claude/hooks/worklist-guard.py app/__shell/worklist-guard.py

  create-release:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compose release body
        env:
          TAG: ${{ github.event.inputs.tag }}
        run: |
          PREV_TAG=$(git tag --sort=-creatordate | grep -v "^${TAG}\$" | head -1 || true)
          if [ -n "$PREV_TAG" ]; then
            CHANGELOG=$(git log "${PREV_TAG}..HEAD" --pretty=format:'- %s' --no-merges)
          else
            CHANGELOG=$(git log HEAD --pretty=format:'- %s' --no-merges)
          fi
          export TAG CHANGELOG
          envsubst '${TAG} ${CHANGELOG}' \
            < .github/release-body-template.md \
            > release-body.md

          echo "::group::Composed release body"
          cat release-body.md
          echo "::endgroup::"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag }}
          body_path: release-body.md

  build:
    needs: create-release
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-amd64
            target: x86_64-unknown-linux-gnu
            ext: ""
            archive: tar.gz
          - os: macos-latest
            label: macos-arm64
            target: aarch64-apple-darwin
            ext: ""
            archive: tar.gz
          - os: macos-latest
            label: macos-intel
            target: x86_64-apple-darwin
            ext: ""
            archive: tar.gz
          - os: windows-latest
            label: windows-amd64
            target: x86_64-pc-windows-msvc
            ext: .exe
            archive: zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.target }}

      - name: Install Linux dependencies (Tauri webkit2gtk + friends)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            libssl-dev \
            build-essential \
            curl \
            wget \
            file

      - name: Build (debug; debug is the shipping format)
        working-directory: src-tauri
        run: cargo build --target ${{ matrix.target }}

      - name: Package (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          cp src-tauri/target/${{ matrix.target }}/debug/bram${{ matrix.ext }} ./bram${{ matrix.ext }}
          tar -czf bram-${{ matrix.label }}.${{ matrix.archive }} bram${{ matrix.ext }}

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Copy-Item src-tauri/target/${{ matrix.target }}/debug/bram${{ matrix.ext }} -Destination ./bram${{ matrix.ext }}
          Compress-Archive -Path bram${{ matrix.ext }} -DestinationPath bram-${{ matrix.label }}.${{ matrix.archive }}

      - name: Upload to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: bram-${{ matrix.label }}.${{ matrix.archive }}
          tag_name: ${{ github.event.inputs.tag }}

  publish-checksums:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all release artifacts
        run: |
          mkdir artifacts
          cd artifacts
          for asset in \
            bram-linux-amd64.tar.gz \
            bram-macos-arm64.tar.gz \
            bram-macos-intel.tar.gz \
            bram-windows-amd64.zip; do
            curl -fsSL -o "${asset}" \
              "https://github.com/${{ github.repository }}/releases/download/${{ github.event.inputs.tag }}/${asset}"
          done

      - name: Generate SHA256SUMS
        working-directory: artifacts
        run: |
          shasum -a 256 *.tar.gz *.zip > SHA256SUMS
          cat SHA256SUMS

      - name: Checkout repository (for install scripts)
        uses: actions/checkout@v4
        with:
          path: repo

      - name: Append installer script hashes to SHA256SUMS
        run: |
          shasum -a 256 repo/install.sh | sed 's| repo/| |' >> artifacts/SHA256SUMS
          shasum -a 256 repo/install.ps1 | sed 's| repo/| |' >> artifacts/SHA256SUMS
          cat artifacts/SHA256SUMS

      - name: Upload SHA256SUMS and installer scripts to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/SHA256SUMS
            repo/install.sh
            repo/install.ps1
          tag_name: ${{ github.event.inputs.tag }}
