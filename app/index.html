<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>xmlui-desktop</title>
    <link rel="stylesheet" href="vendor/xterm.css" />
    <link rel="stylesheet" href="styles.css" />
    <script src="vendor/xterm.js"></script>
    <script src="vendor/addon-fit.js"></script>
    <script src="vendor/addon-webgl.js"></script>
  </head>
  <body>
    <div class="toolbar top">
      <button id="reload-right" title="Reload the XMLUI right pane">
        &#x21bb; reload xmlui app
      </button>
      <button id="open-devtools" title="Open WebView devtools">
        &#x1F50D; browser devtools
      </button>
      <button id="toggle-tools" title="Toggle the agent tools drawer">
        &#x1F6E0; agent tools
      </button>
      <button id="font-smaller" title="Decrease terminal font size (Cmd+-)">
        A&minus;
      </button>
      <button id="font-larger" title="Increase terminal font size (Cmd+=)">
        A+
      </button>
      <button id="voice-open" title="Voice input via local Whisper (Cmd+Shift+D)">
        &#x1F3A4; voice
      </button>
    </div>
    <div id="voice-overlay" class="voice-overlay hidden" role="dialog" aria-label="Voice input">
      <div class="card">
        <h2>Voice input</h2>
        <p class="hint">Click Record, speak, click Stop. The transcript appears below — review and edit, then Send (or Cmd/Ctrl+Enter) to submit to the terminal as a fresh user turn. Esc cancels.</p>
        <div class="server-row">
          <span id="voice-server-status" class="server-status" data-state="stopped">Server: Stopped</span>
          <span class="server-actions">
            <button id="voice-server-start">Start</button>
            <button id="voice-server-stop">Stop</button>
            <button id="voice-server-restart">Restart</button>
          </span>
        </div>
        <div id="voice-status" class="status" data-kind="idle"></div>
        <div class="record-row">
          <button id="voice-record" class="record">&#x1F3A4; Record</button>
        </div>
        <textarea id="voice-input" placeholder="Transcript will appear here…"></textarea>
        <div class="actions">
          <button id="voice-cancel">Cancel</button>
          <button id="voice-send" class="primary">Send</button>
        </div>
      </div>
    </div>
    <div class="split">
      <div id="terminal" class="pane pane-left"></div>
      <div id="splitter" class="splitter" role="separator" aria-orientation="vertical"></div>
      <div class="right-column">
        <iframe
          id="right-pane"
          class="pane pane-project"
        ></iframe>
        <div
          id="h-splitter"
          class="h-splitter hidden"
          role="separator"
          aria-orientation="horizontal"
        ></div>
        <iframe
          id="tools-pane"
          class="pane pane-tools hidden"
          src="about:blank"
        ></iframe>
      </div>
    </div>
    <script>
      // Confirm index.html itself reloaded fresh (writes to cargo run stderr
      // via the existing log_from_right_pane command — same channel as the
      // iframe uses so we can compare timestamps).
      if (window.__TAURI__ && window.__TAURI__.core) {
        window.__TAURI__.core
          .invoke("log_from_right_pane", {
            payload: {
              kind: "index.html-loaded",
              at: new Date().toISOString(),
            },
          })
          .catch(function () {});
      }
      // Cache-bust main.js on every load so JS edits are picked up after a
      // restart without fighting the webview cache.
      document.write(
        '<script src="main.js?v=' + Date.now() + '"></' + 'script>'
      );
    </script>
  </body>
</html>
