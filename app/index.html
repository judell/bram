<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bram</title>
    <link rel="stylesheet" href="vendor/xterm.css" />
    <link rel="stylesheet" href="styles.css" />
    <script src="vendor/xterm.js"></script>
    <script src="vendor/addon-fit.js"></script>
    <script src="vendor/addon-webgl.js"></script>
  </head>
  <body>
    <div class="toolbar top">
      <button id="reload-right" title="Reload the XMLUI right pane">
        &#x21bb; reload xmlui app
      </button>
      <button id="open-devtools" title="Open WebView devtools">
        &#x1F50D; browser devtools
      </button>
      <button id="toggle-tools" title="Toggle the agent tools drawer">
        &#x1F6E0; agent tools
      </button>
      <button id="toggle-terminal" title="Toggle the terminal pane">
        &#x25A2; terminal
      </button>
      <button id="font-smaller" title="Decrease terminal font size (Cmd+-)">
        A&minus;
      </button>
      <button id="font-larger" title="Increase terminal font size (Cmd+=)">
        A+
      </button>
      <button id="voice-toggle" data-state="idle" title="Voice input via local Whisper (Cmd+Shift+D)">
        &#x1F3A4; voice
      </button>
    </div>
    <div class="split">
      <div id="terminal" class="pane pane-left"></div>
      <div id="splitter" class="splitter" role="separator" aria-orientation="vertical"></div>
      <div class="right-column">
        <iframe
          id="right-pane"
          class="pane pane-project"
          allow="clipboard-write; clipboard-read"
        ></iframe>
        <div
          id="h-splitter"
          class="h-splitter"
          role="separator"
          aria-orientation="horizontal"
        ></div>
        <iframe
          id="tools-pane"
          class="pane pane-tools"
          src="about:blank"
          allow="clipboard-write; clipboard-read"
        ></iframe>
      </div>
    </div>
    <script>
      // Confirm index.html itself reloaded fresh (writes to cargo run stderr
      // via the existing log_from_right_pane command — same channel as the
      // iframe uses so we can compare timestamps).
      if (window.__TAURI__ && window.__TAURI__.core) {
        window.__TAURI__.core
          .invoke("log_from_right_pane", {
            payload: {
              kind: "index.html-loaded",
              at: new Date().toISOString(),
            },
          })
          .catch(function () {});
      }
      // Cache-bust main.js on every load so JS edits are picked up after a
      // restart without fighting the webview cache.
      document.write(
        '<script src="main.js?v=' + Date.now() + '"></' + 'script>'
      );
    </script>
  </body>
</html>
